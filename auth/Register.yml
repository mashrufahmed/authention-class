info:
  name: Register
  type: http
  seq: 1

http:
  method: POST
  url: http://localhost:3000/api/auth/register
  body:
    type: json
    data: |-
      {
        "name": "Hello",
        "email": "hello@gmail.com",
        "password": "123456"
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
